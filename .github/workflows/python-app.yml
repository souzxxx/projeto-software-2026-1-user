name: Deploy Automático Python Flask

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Instalar dependências (Lint/Test)
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: "souzx"
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push da imagem
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: souzx/py-conexoes-ci:${{ github.sha }}

    - name: Deploy remoto via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST_TEST }}
        username: "ubuntu"
        key: ${{ secrets.KEY_TEST }}
        port: 22
        script: |
          # Para o container antigo se ele existir
          docker stop py-conexoes || true
          docker rm --force py-conexoes || true
          
          # Limpa imagens antigas para não encher o disco do servidor
          docker image prune -f
          
          # Roda o novo container
          # Ajustado para porta 5000 do Flask e variável do Postgres
          docker run -d \
            -p 5000:5000 \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --network=rede \
            --name py-conexoes \
            souzx/py-conexoes-ci:${{ github.sha }}
